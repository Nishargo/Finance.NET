name: CI

on:
  push:
    branches: [main]

  schedule:
    - cron: '0 2 * * *'

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:

# =========================
#  FAST CI
# =========================
  fast-ci:
    runs-on: ubuntu-latest

    env:
      FORCE_COLOR: "true"

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # CACHE + FASTER SDK
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        cache: true

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Unit Tests (FAST ONLY)
      run: |
        dotnet test \
          --configuration Release \
          --no-build \
          --filter "Category!=Integration&TestCategory!=Long-Running"

    - name: Publish build artifacts
      run: dotnet publish -c Release -o out --no-build


# =========================
# INTEGRATION TESTS (ONLY NIGHTLY)
# =========================
  integration-tests:
    runs-on: ubuntu-latest
    if: github.event_name != 'push'

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        cache: true

    - run: dotnet test --configuration Release --filter "Category=Integration"


# =========================
# COVERAGE 
# =========================
  coverage:
    runs-on: ubuntu-latest
    needs: fast-ci

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        cache: true

    - name: Install tools
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

   
    - name: Run tests with coverage (only unit subset)
      run: |
        dotnet test \
          --configuration Release \
          --no-build \
          --filter "Category!=Integration&TestCategory!=Long-Running" \
          --collect:"XPlat Code Coverage" \
          --results-directory ./TestResults

    - name: Generate coverage report
      run: |
        reportgenerator \
          -reports:./TestResults/**/coverage.cobertura.xml \
          -targetdir:./TestResults/Reports \
          -reporttypes:"lcov;Cobertura"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: ./TestResults/Reports
