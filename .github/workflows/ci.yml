name: CI

on:
  push:
    branches: [main]

  schedule:
    - cron: '0 2 * * *'   # nightly full run (UTC)

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:

# =========================
# ⚡ FAST CI (MAIN PIPELINE)
# =========================
  fast-ci:
    name: Fast CI (Unit Tests)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET (with cache)
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        cache: true

    # 🔒 Deterministic restore (requires packages.lock.json)
    - name: Restore (locked mode)
      run: dotnet restore --locked-mode

    - name: Build (no restore)
      run: dotnet build -c Release --no-restore

    - name: Run Unit Tests (FAST ONLY)
      run: |
        dotnet test \
          -c Release \
          --no-build \
          --filter "Category!=Integration&TestCategory!=Long-Running"

# =========================
# 🧪 INTEGRATION TESTS (NIGHTLY ONLY)
# =========================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'push'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET (with cache)
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        cache: true

    - name: Restore (locked mode)
      run: dotnet restore --locked-mode

    - name: Run Integration Tests (SLOW)
      run: |
        dotnet test \
          -c Release \
          --no-build \
          --filter "Category=Integration"

# =========================
# 📊 COVERAGE (FAST, NO DUPLICATION)
# =========================
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: fast-ci

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET (with cache)
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        cache: true

    - name: Restore (locked mode)
      run: dotnet restore --locked-mode

    - name: Run Tests with Coverage (UNIT ONLY)
      run: |
        dotnet test \
          -c Release \
          --no-build \
          --filter "Category!=Integration&TestCategory!=Long-Running" \
          --collect:"XPlat Code Coverage" \
          --results-directory ./TestResults

    - name: Install report generator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Generate Coverage Report
      run: |
        reportgenerator \
          -reports:./TestResults/**/coverage.cobertura.xml \
          -targetdir:./TestResults/Reports \
          -reporttypes:"lcov;Cobertura;Html"

    - name: Upload Coverage Artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: ./TestResults/Reports
